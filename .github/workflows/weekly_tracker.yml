name: Weekly Austin Permits Tracker

on:
  schedule:
    # Every Monday at 8:00 AM UTC (3:00 AM Austin time)
    - cron: "0 8 * * 1"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write  # Needed to commit & push updated JSON files

jobs:
  track-permits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full permit fetch
        run: python fetch_permits.py

      - name: Run weekly tracker (diff & save updates)
        run: python weekly_tracker.py --once

      - name: Commit & push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are actual changes
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: weekly permit update $(date +'%Y-%m-%d')" && git push
